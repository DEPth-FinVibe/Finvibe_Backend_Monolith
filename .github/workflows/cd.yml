name: CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || format('{0}/finvibe-backend-monolith', secrets.DOCKERHUB_USERNAME) }}
  CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'finvibe-backend' }}
  APP_PORT: ${{ vars.APP_PORT || '8080' }}
  LOG_DIR_HOST: ${{ vars.LOG_DIR_HOST || '/var/log/finvibe-backend' }}
  PRIMARY_DOCKER_NETWORK: ${{ vars.PRIMARY_DOCKER_NETWORK || 'infra_bridge' }}
  SECONDARY_DOCKER_NETWORK: ${{ vars.SECONDARY_DOCKER_NETWORK || 'monitoring_net' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          LOG_DIR_HOST: ${{ env.LOG_DIR_HOST }}
          PRIMARY_DOCKER_NETWORK: ${{ env.PRIMARY_DOCKER_NETWORK }}
          SECONDARY_DOCKER_NETWORK: ${{ env.SECONDARY_DOCKER_NETWORK }}
          IMAGE_TAG: ${{ github.sha }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_HMAC_SECRET: ${{ secrets.JWT_HMAC_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KIS_USER_ID: ${{ secrets.KIS_USER_ID }}
          KIS_API_KEY_1: ${{ secrets.KIS_API_KEY_1 }}
          KIS_API_SECRET_1: ${{ secrets.KIS_API_SECRET_1 }}
          KIS_API_KEY_2: ${{ secrets.KIS_API_KEY_2 }}
          KIS_API_SECRET_2: ${{ secrets.KIS_API_SECRET_2 }}
          KIS_API_KEY_3: ${{ secrets.KIS_API_KEY_3 }}
          KIS_API_SECRET_3: ${{ secrets.KIS_API_SECRET_3 }}
          OAUTH_BASE_URI: ${{ secrets.OAUTH_BASE_URI }}
          OAUTH_REDIRECT_URL: ${{ secrets.OAUTH_REDIRECT_URL }}
          MARKET_WS_FANOUT_CHUNK_SIZE: ${{ vars.MARKET_WS_FANOUT_CHUNK_SIZE || '100' }}
          MARKET_WS_FANOUT_MAX_CHUNK_PARALLELISM: ${{ vars.MARKET_WS_FANOUT_MAX_CHUNK_PARALLELISM || '8' }}
          MARKET_WS_FANOUT_EXECUTOR_CORE_SIZE: ${{ vars.MARKET_WS_FANOUT_EXECUTOR_CORE_SIZE || '4' }}
          MARKET_WS_FANOUT_EXECUTOR_MAX_SIZE: ${{ vars.MARKET_WS_FANOUT_EXECUTOR_MAX_SIZE || '8' }}
          MARKET_WS_FANOUT_EXECUTOR_QUEUE_CAPACITY: ${{ vars.MARKET_WS_FANOUT_EXECUTOR_QUEUE_CAPACITY || '128' }}
          MARKET_WS_SESSION_SEND_TIME_LIMIT_MS: ${{ vars.MARKET_WS_SESSION_SEND_TIME_LIMIT_MS || '500' }}
          MARKET_WS_SESSION_BUFFER_SIZE_LIMIT_BYTES: ${{ vars.MARKET_WS_SESSION_BUFFER_SIZE_LIMIT_BYTES || '65536' }}
          MARKET_WS_SEND_FAILURE_THRESHOLD: ${{ vars.MARKET_WS_SEND_FAILURE_THRESHOLD || '2' }}
          MARKET_WS_SEND_SLOW_THRESHOLD_MS: ${{ vars.MARKET_WS_SEND_SLOW_THRESHOLD_MS || '250' }}
          MARKET_WS_SEND_SLOW_STRIKES_THRESHOLD: ${{ vars.MARKET_WS_SEND_SLOW_STRIKES_THRESHOLD || '2' }}
          MARKET_WS_SEND_EXECUTOR_CORE_SIZE: ${{ vars.MARKET_WS_SEND_EXECUTOR_CORE_SIZE || '16' }}
          MARKET_WS_SEND_EXECUTOR_MAX_SIZE: ${{ vars.MARKET_WS_SEND_EXECUTOR_MAX_SIZE || '32' }}
          MARKET_WS_SEND_EXECUTOR_QUEUE_CAPACITY: ${{ vars.MARKET_WS_SEND_EXECUTOR_QUEUE_CAPACITY || '256' }}
          MARKET_MOCK_EMIT_INTERVAL_MS: ${{ vars.MARKET_MOCK_EMIT_INTERVAL_MS || '1000' }}
          MARKET_MOCK_STOCKS_PER_TICK: ${{ vars.MARKET_MOCK_STOCKS_PER_TICK || '100' }}
          MARKET_MOCK_PUBLISH_THREADS: ${{ vars.MARKET_MOCK_PUBLISH_THREADS || '4' }}
          MARKET_MOCK_PUBLISH_QUEUE_CAPACITY: ${{ vars.MARKET_MOCK_PUBLISH_QUEUE_CAPACITY || '64' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_NAME,CONTAINER_NAME,APP_PORT,LOG_DIR_HOST,PRIMARY_DOCKER_NETWORK,SECONDARY_DOCKER_NETWORK,IMAGE_TAG,DB_URL,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,KAFKA_BOOTSTRAP_SERVERS,JWT_SECRET,JWT_HMAC_SECRET,GEMINI_API_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,KIS_USER_ID,KIS_API_KEY_1,KIS_API_SECRET_1,KIS_API_KEY_2,KIS_API_SECRET_2,KIS_API_KEY_3,KIS_API_SECRET_3,OAUTH_BASE_URI,OAUTH_REDIRECT_URL,MARKET_WS_FANOUT_CHUNK_SIZE,MARKET_WS_FANOUT_MAX_CHUNK_PARALLELISM,MARKET_WS_FANOUT_EXECUTOR_CORE_SIZE,MARKET_WS_FANOUT_EXECUTOR_MAX_SIZE,MARKET_WS_FANOUT_EXECUTOR_QUEUE_CAPACITY,MARKET_WS_SESSION_SEND_TIME_LIMIT_MS,MARKET_WS_SESSION_BUFFER_SIZE_LIMIT_BYTES,MARKET_WS_SEND_FAILURE_THRESHOLD,MARKET_WS_SEND_SLOW_THRESHOLD_MS,MARKET_WS_SEND_SLOW_STRIKES_THRESHOLD,MARKET_WS_SEND_EXECUTOR_CORE_SIZE,MARKET_WS_SEND_EXECUTOR_MAX_SIZE,MARKET_WS_SEND_EXECUTOR_QUEUE_CAPACITY,MARKET_MOCK_EMIT_INTERVAL_MS,MARKET_MOCK_STOCKS_PER_TICK,MARKET_MOCK_PUBLISH_THREADS,MARKET_MOCK_PUBLISH_QUEUE_CAPACITY
          script_stop: true
          script: |
            set -eu

            echo "Deploy target hostname:"
            hostname || true
            echo "Host log directory: ${LOG_DIR_HOST}"
            echo "Primary docker network: ${PRIMARY_DOCKER_NETWORK}"
            echo "Secondary docker network: ${SECONDARY_DOCKER_NETWORK}"
            echo "Docker networks on target:"
            docker network ls || true

            required_vars="DB_URL DB_USERNAME DB_PASSWORD REDIS_HOST REDIS_PORT KAFKA_BOOTSTRAP_SERVERS JWT_SECRET JWT_HMAC_SECRET KIS_USER_ID KIS_API_KEY_1 KIS_API_SECRET_1 GEMINI_API_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET NAVER_CLIENT_ID NAVER_CLIENT_SECRET"
            for var_name in ${required_vars}; do
              eval "var_value=\${${var_name}:-}"
              if [ -z "${var_value}" ]; then
                echo "Required deployment variable is missing: ${var_name}"
                exit 1
              fi
            done

            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
            CONTAINER_LOG_JSON_PATH="/app/logs/application-json.log"

            mkdir -p "${LOG_DIR_HOST}"

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker pull "${IMAGE_REF}"

            docker network inspect "${PRIMARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Primary docker network not found: ${PRIMARY_DOCKER_NETWORK}"
              exit 1
            }

            docker network inspect "${SECONDARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Secondary docker network not found: ${SECONDARY_DOCKER_NETWORK}"
              exit 1
            }

            if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              docker rm -f "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --network "${PRIMARY_DOCKER_NETWORK}" \
              -e SPRING_PROFILES_ACTIVE=prod,oauth,mock-market \
              -e LOG_JSON_PATH="${CONTAINER_LOG_JSON_PATH}" \
              -e DB_URL="${DB_URL}" \
              -e DB_USERNAME="${DB_USERNAME}" \
              -e DB_PASSWORD="${DB_PASSWORD}" \
              -e REDIS_HOST="${REDIS_HOST}" \
              -e REDIS_PORT="${REDIS_PORT}" \
              -e REDIS_PASSWORD="${REDIS_PASSWORD}" \
              -e KAFKA_BOOTSTRAP_SERVERS="${KAFKA_BOOTSTRAP_SERVERS}" \
              -e JWT_SECRET="${JWT_SECRET}" \
              -e JWT_HMAC_SECRET="${JWT_HMAC_SECRET}" \
              -e GEMINI_API_KEY="${GEMINI_API_KEY}" \
              -e GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
              -e GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
              -e NAVER_CLIENT_ID="${NAVER_CLIENT_ID}" \
              -e NAVER_CLIENT_SECRET="${NAVER_CLIENT_SECRET}" \
              -e KIS_USER_ID="${KIS_USER_ID}" \
              -e KIS_API_KEY_1="${KIS_API_KEY_1}" \
              -e KIS_API_SECRET_1="${KIS_API_SECRET_1}" \
              -e KIS_API_KEY_2="${KIS_API_KEY_2}" \
              -e KIS_API_SECRET_2="${KIS_API_SECRET_2}" \
              -e KIS_API_KEY_3="${KIS_API_KEY_3}" \
              -e KIS_API_SECRET_3="${KIS_API_SECRET_3}" \
              -e OAUTH_BASE_URI="${OAUTH_BASE_URI}" \
              -e OAUTH_REDIRECT_URL="${OAUTH_REDIRECT_URL}" \
              -e MARKET_WS_FANOUT_CHUNK_SIZE="${MARKET_WS_FANOUT_CHUNK_SIZE}" \
              -e MARKET_WS_FANOUT_MAX_CHUNK_PARALLELISM="${MARKET_WS_FANOUT_MAX_CHUNK_PARALLELISM}" \
              -e MARKET_WS_FANOUT_EXECUTOR_CORE_SIZE="${MARKET_WS_FANOUT_EXECUTOR_CORE_SIZE}" \
              -e MARKET_WS_FANOUT_EXECUTOR_MAX_SIZE="${MARKET_WS_FANOUT_EXECUTOR_MAX_SIZE}" \
              -e MARKET_WS_FANOUT_EXECUTOR_QUEUE_CAPACITY="${MARKET_WS_FANOUT_EXECUTOR_QUEUE_CAPACITY}" \
              -e MARKET_WS_SESSION_SEND_TIME_LIMIT_MS="${MARKET_WS_SESSION_SEND_TIME_LIMIT_MS}" \
              -e MARKET_WS_SESSION_BUFFER_SIZE_LIMIT_BYTES="${MARKET_WS_SESSION_BUFFER_SIZE_LIMIT_BYTES}" \
              -e MARKET_WS_SEND_FAILURE_THRESHOLD="${MARKET_WS_SEND_FAILURE_THRESHOLD}" \
              -e MARKET_WS_SEND_SLOW_THRESHOLD_MS="${MARKET_WS_SEND_SLOW_THRESHOLD_MS}" \
              -e MARKET_WS_SEND_SLOW_STRIKES_THRESHOLD="${MARKET_WS_SEND_SLOW_STRIKES_THRESHOLD}" \
              -e MARKET_WS_SEND_EXECUTOR_CORE_SIZE="${MARKET_WS_SEND_EXECUTOR_CORE_SIZE}" \
              -e MARKET_WS_SEND_EXECUTOR_MAX_SIZE="${MARKET_WS_SEND_EXECUTOR_MAX_SIZE}" \
              -e MARKET_WS_SEND_EXECUTOR_QUEUE_CAPACITY="${MARKET_WS_SEND_EXECUTOR_QUEUE_CAPACITY}" \
              -e MARKET_MOCK_EMIT_INTERVAL_MS="${MARKET_MOCK_EMIT_INTERVAL_MS}" \
              -e MARKET_MOCK_STOCKS_PER_TICK="${MARKET_MOCK_STOCKS_PER_TICK}" \
              -e MARKET_MOCK_PUBLISH_THREADS="${MARKET_MOCK_PUBLISH_THREADS}" \
              -e MARKET_MOCK_PUBLISH_QUEUE_CAPACITY="${MARKET_MOCK_PUBLISH_QUEUE_CAPACITY}" \
              -v "${LOG_DIR_HOST}:/app/logs" \
              -p "${APP_PORT}:8080" \
              "${IMAGE_REF}"

            if ! docker network connect "${SECONDARY_DOCKER_NETWORK}" "${CONTAINER_NAME}"; then
              echo "Failed to connect container to secondary network"
              docker logs "${CONTAINER_NAME}" || true
              exit 1
            fi

            for i in $(seq 1 60); do
              if ! docker ps --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
                echo "Container exited before becoming healthy"
                docker logs "${CONTAINER_NAME}" || true
                exit 1
              fi

              if curl --silent --fail "http://localhost:${APP_PORT}/actuator/health/readiness" >/dev/null; then
                echo "Deployment healthy"
                exit 0
              fi

              echo "Waiting for readiness (${i}/60)..."
              sleep 5
            done

            echo "Readiness check failed. Container state:"
            docker inspect "${CONTAINER_NAME}" --format '{{json .State}}' || true
            echo "Container logs:"
            docker logs "${CONTAINER_NAME}" || true
            exit 1
