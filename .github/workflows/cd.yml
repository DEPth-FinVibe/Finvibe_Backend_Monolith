name: CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || format('{0}/finvibe-backend-monolith', secrets.DOCKERHUB_USERNAME) }}
  CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'finvibe-backend' }}
  APP_PORT: ${{ vars.APP_PORT || '8080' }}
  PRIMARY_DOCKER_NETWORK: ${{ vars.PRIMARY_DOCKER_NETWORK || 'infra_bridge' }}
  SECONDARY_DOCKER_NETWORK: ${{ vars.SECONDARY_DOCKER_NETWORK || 'monitoring_net' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          PRIMARY_DOCKER_NETWORK: ${{ env.PRIMARY_DOCKER_NETWORK }}
          SECONDARY_DOCKER_NETWORK: ${{ env.SECONDARY_DOCKER_NETWORK }}
          IMAGE_TAG: ${{ github.sha }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_HMAC_SECRET: ${{ secrets.JWT_HMAC_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KIS_USER_ID: ${{ secrets.KIS_USER_ID }}
          KIS_API_KEY_1: ${{ secrets.KIS_API_KEY_1 }}
          KIS_API_SECRET_1: ${{ secrets.KIS_API_SECRET_1 }}
          KIS_API_KEY_2: ${{ secrets.KIS_API_KEY_2 }}
          KIS_API_SECRET_2: ${{ secrets.KIS_API_SECRET_2 }}
          KIS_API_KEY_3: ${{ secrets.KIS_API_KEY_3 }}
          KIS_API_SECRET_3: ${{ secrets.KIS_API_SECRET_3 }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_NAME,CONTAINER_NAME,APP_PORT,PRIMARY_DOCKER_NETWORK,SECONDARY_DOCKER_NETWORK,IMAGE_TAG,DB_URL,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,KAFKA_BOOTSTRAP_SERVERS,JWT_SECRET,JWT_HMAC_SECRET,GEMINI_API_KEY,GOOGLE_CLIENT_SECRET,NAVER_CLIENT_SECRET,KIS_USER_ID,KIS_API_KEY_1,KIS_API_SECRET_1,KIS_API_KEY_2,KIS_API_SECRET_2,KIS_API_KEY_3,KIS_API_SECRET_3
          script_stop: true
          script: |
            set -eu

            required_vars="DB_URL DB_USERNAME DB_PASSWORD REDIS_HOST REDIS_PORT KAFKA_BOOTSTRAP_SERVERS JWT_SECRET JWT_HMAC_SECRET KIS_USER_ID KIS_API_KEY_1 KIS_API_SECRET_1 GEMINI_API_KEY GOOGLE_CLIENT_SECRET NAVER_CLIENT_SECRET"
            for var_name in ${required_vars}; do
              eval "var_value=\${${var_name}:-}"
              if [ -z "${var_value}" ]; then
                echo "Required deployment variable is missing: ${var_name}"
                exit 1
              fi
            done

            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker pull "${IMAGE_REF}"

            docker network inspect "${PRIMARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Primary docker network not found: ${PRIMARY_DOCKER_NETWORK}"
              exit 1
            }

            docker network inspect "${SECONDARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Secondary docker network not found: ${SECONDARY_DOCKER_NETWORK}"
              exit 1
            }

            if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              docker rm -f "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --network "${PRIMARY_DOCKER_NETWORK}" \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL="${DB_URL}" \
              -e DB_USERNAME="${DB_USERNAME}" \
              -e DB_PASSWORD="${DB_PASSWORD}" \
              -e REDIS_HOST="${REDIS_HOST}" \
              -e REDIS_PORT="${REDIS_PORT}" \
              -e REDIS_PASSWORD="${REDIS_PASSWORD}" \
              -e KAFKA_BOOTSTRAP_SERVERS="${KAFKA_BOOTSTRAP_SERVERS}" \
              -e JWT_SECRET="${JWT_SECRET}" \
              -e JWT_HMAC_SECRET="${JWT_HMAC_SECRET}" \
              -e GEMINI_API_KEY="${GEMINI_API_KEY}" \
              -e GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
              -e NAVER_CLIENT_SECRET="${NAVER_CLIENT_SECRET}" \
              -e KIS_USER_ID="${KIS_USER_ID}" \
              -e KIS_API_KEY_1="${KIS_API_KEY_1}" \
              -e KIS_API_SECRET_1="${KIS_API_SECRET_1}" \
              -e KIS_API_KEY_2="${KIS_API_KEY_2}" \
              -e KIS_API_SECRET_2="${KIS_API_SECRET_2}" \
              -e KIS_API_KEY_3="${KIS_API_KEY_3}" \
              -e KIS_API_SECRET_3="${KIS_API_SECRET_3}" \
              -p "${APP_PORT}:8080" \
              "${IMAGE_REF}"

            if ! docker network connect "${SECONDARY_DOCKER_NETWORK}" "${CONTAINER_NAME}"; then
              echo "Failed to connect container to secondary network"
              docker logs "${CONTAINER_NAME}" || true
              exit 1
            fi

            for i in $(seq 1 60); do
              if ! docker ps --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
                echo "Container exited before becoming healthy"
                docker logs "${CONTAINER_NAME}" || true
                exit 1
              fi

              if curl --silent --fail "http://localhost:${APP_PORT}/actuator/health/readiness" >/dev/null; then
                echo "Deployment healthy"
                exit 0
              fi

              echo "Waiting for readiness (${i}/60)..."
              sleep 5
            done

            echo "Readiness check failed. Container state:"
            docker inspect "${CONTAINER_NAME}" --format '{{json .State}}' || true
            echo "Container logs:"
            docker logs "${CONTAINER_NAME}" || true
            exit 1
