name: CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || format('{0}/finvibe-backend-monolith', secrets.DOCKERHUB_USERNAME) }}
  CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'finvibe-backend' }}
  APP_PORT: ${{ vars.APP_PORT || '8080' }}
  PRIMARY_DOCKER_NETWORK: ${{ vars.PRIMARY_DOCKER_NETWORK || 'infra_bridge' }}
  SECONDARY_DOCKER_NETWORK: ${{ vars.SECONDARY_DOCKER_NETWORK || 'monitoring_net' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          PRIMARY_DOCKER_NETWORK: ${{ env.PRIMARY_DOCKER_NETWORK }}
          SECONDARY_DOCKER_NETWORK: ${{ env.SECONDARY_DOCKER_NETWORK }}
          DEPLOY_ENV_FILE_PATH: ${{ secrets.DEPLOY_ENV_FILE_PATH }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_NAME,CONTAINER_NAME,APP_PORT,PRIMARY_DOCKER_NETWORK,SECONDARY_DOCKER_NETWORK,DEPLOY_ENV_FILE_PATH,IMAGE_TAG
          script_stop: true
          script: |
            set -eu

            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
            if [ ! -f "${DEPLOY_ENV_FILE_PATH}" ]; then
              echo "Deploy env file not found: ${DEPLOY_ENV_FILE_PATH}"
              exit 1
            fi

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker pull "${IMAGE_REF}"

            if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              docker rm -f "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --network "${PRIMARY_DOCKER_NETWORK}" \
              --env-file "${DEPLOY_ENV_FILE_PATH}" \
              -e SPRING_PROFILES_ACTIVE=prod \
              -p "${APP_PORT}:8080" \
              "${IMAGE_REF}"

            docker network connect "${SECONDARY_DOCKER_NETWORK}" "${CONTAINER_NAME}"

            for i in $(seq 1 24); do
              if curl --silent --fail "http://localhost:${APP_PORT}/actuator/health" >/dev/null; then
                echo "Deployment healthy"
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed. Container logs:"
            docker logs "${CONTAINER_NAME}" || true
            exit 1
