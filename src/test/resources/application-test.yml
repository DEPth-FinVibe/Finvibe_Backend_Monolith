spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

market:
  init:
    enabled: false
  ws:
    fanout:
      chunk-size: 200
      max-chunk-parallelism: 2
    session:
      send-time-limit-ms: 50
      buffer-size-limit-bytes: 65536
    send:
      failure-threshold: 2
      slow-threshold-ms: 50
      slow-strikes-threshold: 2
