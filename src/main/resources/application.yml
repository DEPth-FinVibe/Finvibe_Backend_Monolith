spring:
  application:
    name: finvibe-backend-monolith
  main:
    allow-bean-definition-overriding: true
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  jpa:
    open-in-view: false
  web:
    resources:
      add-mappings: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.RestClientException
    instances:
      kisStockSearch:
        baseConfig: default
      kisChartData:
        baseConfig: default
      kisRealtimePrice:
        baseConfig: default

jwt:
  secret: ${JWT_SECRET:testsecret12312312313123123123testsecret12312312313123123123}
  issuer: ${JWT_ISSUER:finvibe-user}
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

app:
  oauth2:
    enabled: false
    base-url: ${OAUTH_REDIRECT_URL:http://localhost:3000/oauth/callback}

external:
  gamification:
    base-url: ${GAMIFICATION_BASE_URL:http://localhost:8080}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:testsecret12312312313123123123}

market:
  ws:
    fanout:
      chunk-size: ${MARKET_WS_FANOUT_CHUNK_SIZE:200}
      max-pending-messages-per-session: ${MARKET_WS_MAX_PENDING_MESSAGES_PER_SESSION:32}
      executor:
        core-size: ${MARKET_WS_FANOUT_EXECUTOR_CORE_SIZE:2}
        max-size: ${MARKET_WS_FANOUT_EXECUTOR_MAX_SIZE:4}
        queue-capacity: ${MARKET_WS_FANOUT_EXECUTOR_QUEUE_CAPACITY:256}
    send:
      failure-threshold: ${MARKET_WS_SEND_FAILURE_THRESHOLD:3}
      slow-threshold-ms: ${MARKET_WS_SEND_SLOW_THRESHOLD_MS:1000}
      slow-strikes-threshold: ${MARKET_WS_SEND_SLOW_STRIKES_THRESHOLD:2}
      executor:
        core-size: ${MARKET_WS_SEND_EXECUTOR_CORE_SIZE:8}
        max-size: ${MARKET_WS_SEND_EXECUTOR_MAX_SIZE:16}
        queue-capacity: ${MARKET_WS_SEND_EXECUTOR_QUEUE_CAPACITY:512}
  kis:
    base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
    user-id: ${KIS_USER_ID:}
    credentials:
      - app-key: ${KIS_API_KEY_1:${KIS_API_KEY:}}
        app-secret: ${KIS_API_SECRET_1:${KIS_API_SECRET:}}
      - app-key: ${KIS_API_KEY_2:}
        app-secret: ${KIS_API_SECRET_2:}
    websocket:
      url: ${KIS_WEBSOCKET_URL:ws://ops.koreainvestment.com:21000}

langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY}
      model-name: ${GEMINI_MODEL_NAME:gemini-2.5-flash}
      high-model-name: ${GEMINI_HIGH_MODEL_NAME:gemini-2.5-flash}
