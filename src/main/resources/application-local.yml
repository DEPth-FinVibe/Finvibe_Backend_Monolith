spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/finvibe
    username: finvibe
    password: finvibe
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: info
    depth.finvibe: debug

market:
  category:
    warmup:
      enabled: true
      fail-fast: false
